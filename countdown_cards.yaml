type: vertical-stack
cards:
  - type: custom:button-card
    name: ⏰ Nächster teurer Tarif
    entity: sensor.general_stadtwerke_wetzikon_strompreis_forecast
    show_state: false
    show_name: true
    show_icon: false
    styles:
      card:
        - background-color: '#F44336'
        - color: white
        - font-size: 18px
        - font-weight: bold
        - padding: 16px
      name:
        - color: white
    state:
      - operator: template
        value: |
          const forecast = entity.attributes.forecast;
          if (!forecast) return 'Keine Daten';
          const now = new Date();
          for (let item of forecast) {
            if (item.category === 'expensive' || item.category === 'peak') {
              const itemTime = new Date(item.hour);
              if (itemTime > now) {
                const diffMs = itemTime - now;
                const diffH = Math.floor(diffMs / 3600000);
                const diffM = Math.floor((diffMs % 3600000) / 60000);
                return diffH + 'h ' + diffM + 'min';
              }
            }
          }
          return 'Kein teurer Tarif';

  - type: custom:button-card
    name: 💰 Nächster günstiger Tarif
    entity: sensor.general_stadtwerke_wetzikon_strompreis_forecast
    show_state: false
    show_name: true
    show_icon: false
    styles:
      card:
        - background-color: '#4CAF50'
        - color: white
        - font-size: 18px
        - font-weight: bold
        - padding: 16px
      name:
        - color: white
    state:
      - operator: template
        value: |
          const forecast = entity.attributes.forecast;
          if (!forecast) return 'Keine Daten';
          const now = new Date();
          for (let item of forecast) {
            if (item.category === 'cheap') {
              const itemTime = new Date(item.hour);
              if (itemTime > now) {
                const diffMs = itemTime - now;
                const diffH = Math.floor(diffMs / 3600000);
                const diffM = Math.floor((diffMs % 3600000) / 60000);
                return diffH + 'h ' + diffM + 'min';
              }
            }
          }
          return 'Kein günstiger Tarif';
