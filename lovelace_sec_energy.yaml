type: custom:apexcharts-card
header:
  show: true
  title: 📊 Strompreis 24h Vorhersage
  show_states: true
  colorize_states: true
graph_span: 24h
span:
  start: minute
  offset: +0m
now:
  show: true
  label: Jetzt
series:
  - entity: sensor.general_stadtwerke_wetzikon_strompreis_forecast
    name: Strompreis
    type: column
    data_generator: |
      const forecast = entity.attributes.forecast;
      if (!forecast) return [];
      return forecast.map(item => {
        const colorMap = {
          'cheap': '#4CAF50',
          'normal': '#FFC107',
          'expensive': '#FF9800',
          'peak': '#F44336'
        };
        return {
          x: new Date(item.hour).getTime(),
          y: item.price,
          fillColor: colorMap[item.category] || '#9E9E9E'
        };
      });
    float_precision: 4
    show:
      legend_value: false
yaxis:
  - min: ~0.09
    max: ~0.16
    decimals: 4
apex_config:
  yaxis:
    title:
      text: CHF/kWh
  chart:
    toolbar:
      show: false
    animations:
      enabled: true
  legend:
    show: false
  tooltip:
    y:
      formatter: |
        function(val, { seriesIndex, dataPointIndex, w }) {
          const forecast = w.config.series[seriesIndex].data[dataPointIndex];
          const item = entity.attributes.forecast[dataPointIndex];
          return val + ' CHF/kWh (' + item.category_label + ')';
        }
